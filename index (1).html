  const DUROOD=[{n:1,t:'درود ابراہیمی',r:'Durood Ibrahimi',a:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ',ro:'Allahumma salli ala Muhammadin wa ala aali Muhammadin kama sallayta ala Ibrahim'},{n:2,t:'درود تاج',r:'Durood Taj',a:'اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ صَاحِبِ التَّاجِ',ro:'Allahumma salli ala sayyidina Muhammadin sahibit taaj'},{n:3,t:'درود فتح',r:'Durood Fath',a:'اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ الْفَاتِحِ لِمَا أُغْلِقَ',ro:'Allahumma salli ala sayyidina Muhammadin al-fatihi lima ughliq'},{n:4,t:'درود نارییہ',r:'Durood Nariya',a:'اللَّهُمَّ صَلِّ صَلَاةً كَامِلَةً وَسَلِّمْ سَلَامًا تَامًّا',ro:'Allahumma salli salatan kamilatan wa sallim salaman tamman'},{n:5,t:'درود شفاء',r:'Durood Shifa',a:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ طِبِّ الْقُلُوبِ وَدَوَائِهَا',ro:'Allahumma salli ala Muhammadin tibbil quloob'},{n:6,t:'درود رحمت',r:'Durood Rehmat',a:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ رَحْمَةً لِلْعَالَمِينَ',ro:'Allahumma salli ala Muhammadin rahmatan lil aalamin'},{n:7,t:'درود تنجینا',r:'Durood Tunjina',a:'اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ صَلَاةً تُنْجِينَا',ro:'Allahumma salli ala sayyidina Muhammadin salatan tunjina'},{n:8,t:'درود مختصر',r:'Durood Mukhtasar',a:'صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ',ro:'Sallallahu alaihi wa sallam'},{n:9,t:'درود نور',r:'Durood Noor',a:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ نُورِ الأَنْوَارِ',ro:'Allahumma salli ala Muhammadin nuril anwar'},{n:10,t:'درود مقبول',r:'Durood Maqbool',a:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ صَلَاةً مَقْبُولَةً',ro:'Allahumma salli ala Muhammadin salatan maqbulah'}];
  const Durood=()=>(
    <>
      <BkH title={t('چہل درود شریف','Chehel Durood')}/>
      <div style={{padding:'14px 14px 80px',direction:'rtl',display:'flex',flexDirection:'column',gap:10}}>
        <div style={{background:gradBg,borderRadius:14,padding:14,color:'white',textAlign:'center',marginBottom:4}}>
          <div style={{fontSize:22}}>🌿</div>
          <div style={{fontSize:15,fontWeight:700,marginTop:4,fontFamily:urduFont}}>چہل درود شریف</div>
          <div style={{fontSize:11,opacity:0.8,marginTop:3}}>40 Mashhoor Durood Shareef</div>
        </div>
        {DUROOD.map(d=>(
          <div key={d.n} style={{...card,padding:15,borderRight:`4px solid ${C.gold}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,borderBottom:'1px solid #E8F5EE',paddingBottom:8}}>
              <div style={{width:28,height:28,background:gradBg,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:11,fontWeight:700}}>{d.n}</div>
              <div style={{fontSize:13,color:C.primary,fontWeight:700,fontFamily:uf}}>{t(d.t,d.r)}</div>
            </div>
            <div style={{background:C.bg,borderRadius:10,padding:11,marginBottom:8}}>
              <div style={{fontSize:18,color:C.text,lineHeight:2.4,textAlign:'right'}}>{d.a}</div>
            </div>
            <div style={{fontSize:11,color:C.textMid,fontStyle:'italic',lineHeight:1.7}}>{d.ro}</div>
          </div>
        ))}
      </div>
    </>
  );

  const render=()=>{
    switch(pg){
      case 'home': return <Home/>;
      case 'calendar': return <Calendar/>;
      case 'prayer': return <Prayer/>;
      case 'tasbeeh': return <Tasbeeh/>;
      case 'hafizi': return <Hafizi/>;
      case 'qibla': return <Qibla/>;
      case 'quran13': return <Quran13/>;
      case 'audio': return <Audio/>;
      case 'articles': return <Articles/>;
      case 'artDetail': return <ArtDetail/>;
      case 'upload': return <Upload/>;
      case 'duas': return <Duaen/>;
      case 'azkar': return <Azkar/>;
      case 'names': return <Names/>;
      case 'surahs': return <Surahs/>;
      case 'surahDetail': return <SurahDetail/>;
      case 'durood': return <Durood/>;
      default: return <Home/>;
    }
  };

  return(
    <div style={{fontFamily:latinFont,background:C.bg,minHeight:'100vh',maxWidth:430,margin:'0 auto',position:'relative'}}>
      <SideMenu/>
      <TopBar/>
      <div>{render()}</div>
    </div>
  );
}

// Render
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
